<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" fill="#0e1426"/>
  <text x="60" y="90" font-family="Arial" font-size="44" fill="#fff" font-weight="700">Voice Command Flow</text>
  <rect x="70" y="170" width="250" height="110" rx="20" fill="#1a2442"/>
  <rect x="390" y="170" width="250" height="110" rx="20" fill="#1a2442"/>
  <rect x="710" y="170" width="250" height="110" rx="20" fill="#1a2442"/>
  <rect x="1030" y="170" width="180" height="110" rx="20" fill="#1a2442"/>
  <text x="102" y="235" font-family="Arial" font-size="24" fill="#cfe1ff">🎤 Listen</text>
  <text x="420" y="235" font-family="Arial" font-size="24" fill="#cfe1ff">🧠 Intent</text>
  <text x="734" y="235" font-family="Arial" font-size="24" fill="#cfe1ff">⚙️ Execute</text>
  <text x="1068" y="235" font-family="Arial" font-size="24" fill="#cfe1ff">🗣️ Reply</text>
